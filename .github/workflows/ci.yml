name: CI

# Deterministic pre-merge gate (Roadmap/WAYS-OF-WORKING.md -> Review & merge):
#   typecheck-build  -- tsc --noEmit + npm run build
#   e2e              -- the `api` Playwright project against a local Supabase + a locally built
#                       `next start` server. No Vercel dependency yet — golden-beans' Vercel
#                       project is new paid infra, not provisioned until Daniel greenlights it
#                       (Roadmap/01-growth-engine/growth-engine-v1/README.md). Once it exists,
#                       swap this job for the preview-per-PR shape (see the template's original
#                       ci.yml.example in git history for that worked example).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: Type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  e2e:
    name: Playwright vs local Supabase + local server
    runs-on: ubuntu-latest
    # The well-known local-dev demo service_role JWT — the same value `supabase start` always
    # prints for an unmodified supabase/config.toml. Public/documented, not a real secret; never
    # valid against a hosted project. Matches apps/web/.env.local.example.
    env:
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund

      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations + seed.sql)
        working-directory: apps/web
        run: supabase start

      - name: Build
        run: npm run build

      - name: Start the app in the background
        working-directory: apps/web
        run: |
          npm run start &
          echo "Waiting for http://localhost:3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && exit 0
            sleep 1
          done
          echo "::error::App never became ready"; exit 1

      - name: Run Playwright api suite
        run: npm run test:e2e
