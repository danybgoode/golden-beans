name: CI

# Deterministic pre-merge gate (Roadmap/WAYS-OF-WORKING.md -> Review & merge):
#   typecheck-build  -- tsc --noEmit + npm run build
#   e2e              -- the `api` Playwright project against a local Supabase + a locally built
#                       `next start` server. No Vercel dependency yet — golden-beans' Vercel
#                       project is new paid infra, not provisioned until Daniel greenlights it
#                       (Roadmap/01-growth-engine/growth-engine-v1/README.md). Once it exists,
#                       swap this job for the preview-per-PR shape (see the template's original
#                       ci.yml.example in git history for that worked example).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: Type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  e2e:
    name: Playwright vs local Supabase + local server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund

      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations + seed.sql)
        working-directory: apps/web
        run: supabase start

      # Never hardcode a demo key literal here: it drifted once already (a CLI-version
      # bump changed which key format the local API gateway accepts — the old-format
      # service_role JWT worked against one CLI version and 500'd against a newer one).
      # Capture whatever THIS run's CLI actually issued and export it for every later
      # step, so a future CLI bump can't silently break this gate again.
      - name: Export live local Supabase credentials
        working-directory: apps/web
        run: |
          eval "$(supabase status -o env)"
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Start the app in the background
        working-directory: apps/web
        # CONNECTOR_ENABLED=true so the Story 2.1 MCP connector round-trip/isolation/revocation
        # specs exercise a live route; the connector's dark-by-default behavior is instead covered
        # as a pure-function assertion (e2e/mcp-connector.spec.ts) — see lib/flags.ts's header
        # comment for why that doesn't need a second differently-enved server boot.
        env:
          CONNECTOR_ENABLED: 'true'
        run: |
          npm run start > /tmp/next-server.log 2>&1 &
          echo "Waiting for http://localhost:3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && exit 0
            sleep 1
          done
          echo "::error::App never became ready"; exit 1

      - name: Seed the public demo project (commercial-shell Story 1.2)
        run: npm run seed:demo
        env:
          GROWTH_ENGINE_URL: http://localhost:3000

      # commercial-shell Story 3.1 — a fresh CI Supabase never already has this project, so
      # provisionProject() always takes the first-creation path (mints+prints a real key) here;
      # capture it so self-track.spec.ts's isolation test runs for real instead of skipping (the
      # skip path stays exercised for a real production re-run against an already-seeded project,
      # not for CI).
      - name: Seed the self-tracking project (commercial-shell Story 3.1)
        run: |
          KEY=$(npm run seed:self 2>&1 | tee /dev/stderr | grep '^SELF_PROJECT_API_KEY=' | cut -d= -f2)
          if [ -z "$KEY" ]; then echo "::error::seed:self produced no API key"; exit 1; fi
          echo "SELF_PROJECT_API_KEY=$KEY" >> "$GITHUB_ENV"
        env:
          GROWTH_ENGINE_URL: http://localhost:3000

      - name: Run Playwright api suite
        run: npm run test:e2e

      - name: Dump Next.js server log (diagnostics)
        if: always()
        run: cat /tmp/next-server.log || true
