name: CI

# Deterministic pre-merge gate (Roadmap/WAYS-OF-WORKING.md -> Review & merge):
#   typecheck-build  -- tsc --noEmit + npm run build
#   e2e              -- the `api` Playwright project against local Supabase + locally built OFF/ON
#                       `next start` servers. No Vercel dependency yet — golden-beans' Vercel
#                       project is new paid infra, not provisioned until Daniel greenlights it
#                       (Roadmap/01-growth-engine/growth-engine-v1/README.md). Once it exists,
#                       swap this job for the preview-per-PR shape (see the template's original
#                       ci.yml.example in git history for that worked example).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: Type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Zero-dep guard — runs before install so template drift fails fast and cheap.
      - name: Template-drift guard
        run: node scripts/check-template-drift.mjs
      - run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  e2e:
    name: Playwright vs local Supabase + local server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund

      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations + seed.sql)
        working-directory: apps/web
        run: supabase start

      # Never hardcode a demo key literal here: it drifted once already (a CLI-version
      # bump changed which key format the local API gateway accepts — the old-format
      # service_role JWT worked against one CLI version and 500'd against a newer one).
      # Capture whatever THIS run's CLI actually issued and export it for every later
      # step, so a future CLI bump can't silently break this gate again.
      - name: Export live local Supabase credentials
        working-directory: apps/web
        run: |
          eval "$(supabase status -o env)"
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SECRET_KEY" >> "$GITHUB_ENV"
          # Database-backed specs clean their own fixtures through the local migration-owner
          # connection. The app service role remains intentionally unable to DELETE projects or
          # append-only audit evidence.
          echo "SUPABASE_DB_URL=$DB_URL" >> "$GITHUB_ENV"
          # Auth session client (multi-tenant-activation Story 1.1). NEXT_PUBLIC_* are BUILD-time
          # inlined into the client bundle, so they must be exported BEFORE the Build step below —
          # and they persist to the runtime `npm run start` process too (same $GITHUB_ENV rail).
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      # Kill-switch behavior needs a real, differently-enved process. The Playwright process gets
      # the same explicit OFF value as this second-port built server, so this cannot accidentally
      # assert dark behavior against the normal ON server started later in the job.
      - name: Verify new governance seams with enablement gates OFF
        env:
          JOURNEY_PROJECTIONS_ENABLED: 'false'
          EXPERIMENT_GOVERNANCE_ENABLED: 'false'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
        run: |
          set -euo pipefail
          ./node_modules/.bin/next start apps/web --hostname 127.0.0.1 --port 3100 > /tmp/journey-dark-server.log 2>&1 &
          dark_pid=$!
          cleanup() {
            if kill -0 "$dark_pid" 2>/dev/null; then
              kill "$dark_pid" 2>/dev/null || true
              for i in $(seq 1 20); do
                kill -0 "$dark_pid" 2>/dev/null || break
                sleep 0.1
              done
              kill -KILL "$dark_pid" 2>/dev/null || true
            fi
            wait "$dark_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3100/llms.txt > /dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::OFF app never became ready"
            cat /tmp/journey-dark-server.log
            exit 1
          fi

          if ! ./node_modules/.bin/playwright test \
            --config=apps/web/playwright.config.ts \
            apps/web/e2e/journey-dark.spec.ts \
            apps/web/e2e/experiment-governance-dark.spec.ts \
            --project=api; then
            cat /tmp/journey-dark-server.log
            exit 1
          fi

      # commercial-shell Story 3.1 — MUST run before the server starts, not after: a value only
      # reaches an already-running Node process's env if it was set before that process forked.
      # Adding SELF_PROJECT_API_KEY to $GITHUB_ENV after "Start the app" (an earlier version of
      # this workflow did exactly that) exports it for LATER steps' shells, but the already-running
      # `npm run start` background process never re-reads its env — every self-track call silently
      # no-op'd for the rest of the job (0 events, no error — caught live by this exact CI run
      # during Sprint 3's cross-review round 2). Generating the key here, before boot, means the
      # server sees it from its very first request.
      - name: Generate the self-tracking project's API key
        run: echo "SELF_PROJECT_API_KEY=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Start the app in the background
        working-directory: apps/web
        # CONNECTOR_ENABLED=true so the Story 2.1 MCP connector round-trip/isolation/revocation
        # specs exercise a live route; the connector's dark-by-default behavior is instead covered
        # as a pure-function assertion (e2e/mcp-connector.spec.ts) — see lib/flags.ts's header
        # comment for why that doesn't need a second differently-enved server boot.
        # SELF_PROJECT_API_KEY rides in via $GITHUB_ENV (set above) — no explicit env: line needed,
        # same as SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY above.
        env:
          CONNECTOR_ENABLED: 'true'
          # Journey projection HTTP specs exercise the live API seam. The preceding dedicated
          # built-server pass covers the canonical OFF integration; deployment remains born OFF.
          JOURNEY_PROJECTIONS_ENABLED: 'true'
          EXPERIMENT_GOVERNANCE_ENABLED: 'true'
        run: |
          npm run start > /tmp/next-server.log 2>&1 &
          echo "Waiting for http://localhost:3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && exit 0
            sleep 1
          done
          echo "::error::App never became ready"; exit 1

      - name: Seed the public demo project (commercial-shell Story 1.2)
        run: npm run seed:demo
        env:
          GROWTH_ENGINE_URL: http://localhost:3000

      # A fresh CI Supabase never already has this project, so provisionProject() always takes the
      # first-creation path — but here it upserts the SAME key generated above (SELF_PROJECT_API_KEY
      # is already set), so the DB's stored hash matches what the running server was booted with,
      # instead of seed:self minting a second, different random key nobody told the server about.
      - name: Seed the self-tracking project (commercial-shell Story 3.1)
        run: npm run seed:self
        env:
          GROWTH_ENGINE_URL: http://localhost:3000

      - name: Run Playwright api suite
        # Match the test process to the already-running ON server. journey-dark.spec.ts skips in
        # this pass; its assertions ran, without a skip, against the dedicated OFF server above.
        env:
          JOURNEY_PROJECTIONS_ENABLED: 'true'
          EXPERIMENT_GOVERNANCE_ENABLED: 'true'
        run: npm run test:e2e

      - name: Dump Next.js server log (diagnostics)
        if: always()
        run: cat /tmp/next-server.log || true
